<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced RAG · 知识管家</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: system-ui, sans-serif; background:#0f172a; color:#e2e8f0; min-height:100vh; display:flex; flex-direction:column; }
.header { background:#1e293b; padding:16px 24px; display:flex; align-items:center; gap:12px; border-bottom:1px solid #334155; }
.header h1 { font-size:18px; font-weight:600; }
.status { font-size:12px; padding:4px 10px; border-radius:12px; }
.status.online { background:#065f46; color:#6ee7b7; }
#main { flex:1; max-width:800px; width:100%; margin:0 auto; padding:24px; display:flex; flex-direction:column; }
#messages { flex:1; overflow-y:auto; margin-bottom:16px; }
.msg { margin-bottom:16px; padding:12px 16px; border-radius:12px; max-width:85%; line-height:1.6; }
.msg.user { background:#1d4ed8; margin-left:auto; }
.msg.assistant { background:#1e293b; border:1px solid #334155; }
.msg .role { font-size:11px; color:#94a3b8; margin-bottom:4px; }
.input-area { display:flex; gap:8px; position:sticky; bottom:0; background:#0f172a; padding-top:12px; flex-wrap:wrap; }
.input-area textarea { flex:1; min-width:200px; padding:12px; border-radius:8px; border:1px solid #334155; background:#1e293b; color:#e2e8f0; resize:none; height:48px; font-size:14px; }
.input-area button { padding:0 20px; border-radius:8px; border:none; background:#2563eb; color:white; font-size:14px; cursor:pointer; white-space:nowrap; }
.input-area button:hover { background:#1d4ed8; }
.input-area button:disabled { opacity:0.5; cursor:not-allowed; }
.ks-bar { display:flex; gap:8px; align-items:center; padding:8px 0; font-size:13px; width:100%; }
.ks-bar select, .ks-bar input { padding:6px 10px; border-radius:6px; border:1px solid #334155; background:#1e293b; color:#e2e8f0; font-size:13px; }
.ks-bar select { min-width:180px; }
.ks-bar input { flex:1; }
.ks-label { color:#94a3b8; white-space:nowrap; }
.sources { margin-top:8px; font-size:12px; color:#94a3b8; border-top:1px solid #334155; padding-top:8px; }
.source { display:inline-block; background:#334155; padding:2px 8px; border-radius:4px; margin:2px 4px 2px 0; }
.upload-area { margin-bottom:12px; display:flex; gap:8px; align-items:center; }
.upload-area input { font-size:13px; color:#94a3b8; }
.tabs { display:flex; gap:4px; margin-bottom:16px; }
.tab { padding:8px 16px; border-radius:8px 8px 0 0; background:#1e293b; border:1px solid #334155; border-bottom:none; cursor:pointer; font-size:13px; }
.tab.active { background:#2563eb; border-color:#2563eb; }
.loading { display:inline-block; width:8px; height:8px; background:#e2e8f0; border-radius:50%; animation:pulse 1s infinite; margin-left:8px; }
@keyframes pulse { 0%,100% { opacity:0.3; } 50% { opacity:1; } }
</style>
</head>
<body>

<div class="header">
  <h1>🤖 Advanced RAG · 知识管家</h1>
  <span class="status online" id="status">后端已连接</span>
</div>

<div id="main">
  <div class="tabs">
    <button class="tab active" onclick="switchTab('chat')">💬 对话</button>
    <button class="tab" onclick="switchTab('upload')">📄 文档上传</button>
  </div>

  <div id="tab-upload" style="display:none">
    <div class="upload-area">
      <input type="file" id="fileInput" accept=".md,.txt,.pdf,.docx">
      <button onclick="uploadDocument()">上传</button>
    </div>
    <div id="uploadStatus"></div>
  </div>

  <div id="tab-chat">
    <div id="messages"></div>
    <div class="ks-bar">
      <span class="ks-label">📁 知识空间：</span>
      <select id="ksSelect" onchange="onKsSelectChange()">
        <option value="">全部（默认）</option>
      </select>
      <input type="text" id="ksCustom" placeholder="或输入自定义名称..." style="display:none" oninput="onKsCustomInput()">
    </div>
    <div class="input-area">
      <textarea id="input" placeholder="输入问题，按 Enter 发送..." onkeydown="if(event.key=='Enter'&&!event.shiftKey){event.preventDefault();send();}"></textarea>
      <button id="sendBtn" onclick="send()">发送</button>
    </div>
  </div>
</div>

<script>
const API = 'http://localhost:8000';
let knownSpaces = []; // 从 API 加载的知识空间列表

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('tab-chat').style.display = tab === 'chat' ? '' : 'none';
  document.getElementById('tab-upload').style.display = tab === 'upload' ? '' : 'none';
}

function onKsSelectChange() {
  const sel = document.getElementById('ksSelect');
  const custom = document.getElementById('ksCustom');
  if (sel.value === '__custom__') {
    custom.style.display = '';
    custom.focus();
  } else {
    custom.style.display = 'none';
    custom.value = '';
  }
}

function onKsCustomInput() {
  // 当用户在自定义框输入时，同步更新 select 到自定义选项
  const sel = document.getElementById('ksSelect');
  if (document.getElementById('ksCustom').value && sel.value !== '__custom__') {
    sel.value = '__custom__';
  }
}

function getSelectedKsId() {
  const sel = document.getElementById('ksSelect');
  const custom = document.getElementById('ksCustom');
  if (sel.value === '__custom__') return custom.value.trim();
  return sel.value; // '' = 全部
}

async function loadKnowledgeSpaces() {
  try {
    const res = await fetch(`${API}/api/knowledge-spaces`);
    const data = await res.json();
    const spaces = data.spaces || data || [];
    knownSpaces = Array.isArray(spaces) ? spaces : [];
    const sel = document.getElementById('ksSelect');
    // 清空并重建选项
    sel.innerHTML = '<option value="">全部（默认）</option>';
    knownSpaces.forEach(s => {
      const opt = document.createElement('option');
      opt.value = s._id || s.id || s.name;
      opt.textContent = s.name;
      sel.appendChild(opt);
    });
    // 添加自定义选项
    const customOpt = document.createElement('option');
    customOpt.value = '__custom__';
    customOpt.textContent = '➕ 自定义...';
    sel.appendChild(customOpt);
  } catch(e) {
    console.log('加载知识空间失败:', e);
  }
}

async function uploadDocument() {
  const file = document.getElementById('fileInput').files[0];
  if (!file) return alert('请选择文件');
  const form = new FormData();
  form.append('file', file);
  const ksId = getSelectedKsId();
  if (ksId) form.append('knowledge_space_id', ksId);
  const status = document.getElementById('uploadStatus');
  status.textContent = '上传中...';
  try {
    const res = await fetch(`${API}/api/documents/upload`, { method:'POST', body:form });
    const data = await res.json();
    status.innerHTML = `<span style="color:#6ee7b7">✅ 上传成功：${data.title || file.name}</span>`;
  } catch(e) {
    status.innerHTML = `<span style="color:#f87171">❌ ${e.message}</span>`;
  }
}

async function send() {
  const input = document.getElementById('input');
  const msg = input.value.trim();
  if (!msg) return;

  addMessage('user', msg);
  input.value = '';
  document.getElementById('sendBtn').disabled = true;

  const div = addMessage('assistant', '<span class="loading"></span> 思考中...');
  let fullText = '';
  let sources = [];

  const body = { query: msg };
  const ksId = getSelectedKsId();
  if (ksId) body.knowledge_space_ids = [ksId];

  try {
    const res = await fetch(`${API}/api/chat/`, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify(body)
    });

    // SSE 流式读取
    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    while (true) {
      const {done, value} = await reader.read();
      if (done) break;
      const chunk = decoder.decode(value, {stream:true});
      const lines = chunk.split('\n');
      for (const line of lines) {
        if (line.startsWith('data: ')) {
          try {
            const d = JSON.parse(line.slice(6));
            if (d.response) fullText += d.response;
            if (d.sources) sources = d.sources;
          } catch {}
        } else if (line.trim()) {
          fullText += line;
        }
      }
      div.innerHTML = renderContent(fullText) + renderSources(sources);
    }
  } catch(e) {
    div.innerHTML = `<span style="color:#f87171">错误：${e.message}</span>`;
  }

  document.getElementById('sendBtn').disabled = false;
}

function addMessage(role, content) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.innerHTML = `<div class="role">${role==='user'?'你':'AI'}</div>${content}`;
  document.getElementById('messages').appendChild(div);
  document.getElementById('messages').scrollTop = 99999;
  return div;
}

function renderContent(text) {
  return text
    .replace(/\*\*(.+?)\*\*/g, '<b>$1</b>')
    .replace(/\*(.+?)\*/g, '<i>$1</i>')
    .replace(/`(.+?)`/g, '<code style="background:#334155;padding:1px 4px;border-radius:3px">$1</code>')
    .replace(/\n/g, '<br>');
}

function renderSources(sources) {
  if (!sources || !sources.length) return '';
  return `<div class="sources">📚 来源：${sources.map(s =>
    `<span class="source">${s.source || '文档'} (${(s.score*100).toFixed(0)}%)</span>`
  ).join('')}</div>`;
}

// 启动
fetch(`${API}/health`)
  .then(r => r.json())
  .then(() => document.getElementById('status').textContent = '后端已连接')
  .catch(() => document.getElementById('status').textContent = '后端离线');

loadKnowledgeSpaces();
</script>

</body>
</html>
