[pytest]
# 测试发现规则
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 异步测试支持
asyncio_mode = auto

# 标记
markers =
    unit: 单元测试（无外部依赖，CI 必跑）
    integration: 集成测试（依赖 MongoDB/Qdrant/Redis/Neo4j，需 RUN_INTEGRATION_TESTS=1）
    slow: 慢测试（>5s，CI 可选）
    llm: 需要真实 LLM 调用的测试

# 日志
log_cli = false
log_cli_level = WARNING

# 避免收集 scripts/ 下的手动脚本
norecursedirs = scripts .workbuddy vendor node_modules

# 超时（秒，需要 pytest-timeout）
# timeout = 60
