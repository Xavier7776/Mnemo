services:
  # MongoDB 数据库服务（本地开发）
  mongodb:
    image: mongo:7.0
    container_name: mnemo-mongodb-dev
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: mnemo
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - mnemo-network
    healthcheck:
      # mongosh 冷启动较慢，需足够 timeout；使用 --eval 比管道更快
      test: ["CMD", "mongosh", "localhost:27017/test", "--quiet", "--eval", "db.runCommand('ping').ok"]
      interval: 10s
      timeout: 15s
      retries: 5
      start_period: 30s

  # Qdrant 向量数据库服务（本地开发）
  qdrant:
    image: qdrant/qdrant:latest
    container_name: mnemo-qdrant-dev
    restart: unless-stopped
    ports:
      - "6333:6333"  # REST API
      - "6334:6334"  # gRPC API
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - mnemo-network

  # Neo4j 图数据库服务（本地开发）
  neo4j:
    image: neo4j:5.15.0
    container_name: mnemo-neo4j-dev
    restart: unless-stopped
    ports:
      - "7474:7474"  # HTTP
      - "7687:7687"  # Bolt
    environment:
      NEO4J_AUTH: neo4j/password
      NEO4J_PLUGINS: '["apoc"]'  # 启用 APOC 插件
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_import:/var/lib/neo4j/import
      - neo4j_plugins:/plugins
    networks:
      - mnemo-network

  # Redis 缓存服务（本地开发，RediSearch 索引）
  redis:
    image: redis/redis-stack:latest
    container_name: mnemo-redis-dev
    restart: unless-stopped
    ports:
      - "6379:6379"     # Redis 主端口
      - "8001:8001"     # RedisInsight（Web UI）
    # 不在启动参数里强制 --appendonly yes，避免 AOF 空文件覆盖 RDB 数据
    # AOF 通过 CONFIG SET appendonly yes 在运行时按需开启
    volumes:
      - redis_data:/data
    networks:
      - mnemo-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  # external: 复用 mnemo 项目的旧 volume，数据零丢失迁移
  mongodb_data:
    external: true
    name: mnemo_mongodb_data
  mongodb_config:
    external: true
    name: mnemo_mongodb_config
  qdrant_data:
    external: true
    name: mnemo_qdrant_data
  neo4j_data:
    external: true
    name: mnemo_neo4j_data
  neo4j_logs:
    external: true
    name: mnemo_neo4j_logs
  neo4j_import:
    external: true
    name: mnemo_neo4j_import
  neo4j_plugins:
    external: true
    name: mnemo_neo4j_plugins
  redis_data:
    external: true
    name: mnemo_redis_data

networks:
  mnemo-network:
    driver: bridge
